<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings | Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cst.css" />
  <style>
    main{
  min-height: calc(100vh - 70px); /* full screen minus navbar */
  display: flex;
  justify-content: center;
  align-items: center;            /* ⭐ vertical center */
  padding: 20px;
}




/* ===================================== */
/* 🍎 iPhone 12 Pro (390px) Responsive */
/* ===================================== */

@media screen and (max-width: 430px) {

  /* NAVBAR STACK */
  .navbar {
    flex-wrap: wrap;
    padding: 12px 14px;
    height: auto;
  }

  .left-nav {
    width: 50%;
  }

  .logo {
    font-size: 16px;
  }

  

  /* Nav links */
  .nav-links {
    width: 100%;
    font-size: 16px;
    display: flex;
    justify-content: space-between;
    margin-left: 5px;
    margin-top: 12px;
  }

  .nav-links a,
  .profile-btn {
    font-size: 13px;
  }
}


  </style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="left-nav">
    <div class="logo">Cinema verse</div>
  </div>

 

  <nav class="nav-links">
    <a href="explore.html">Explore</a>
    <a href="upcoming.html">Upcoming</a>
    <a href="about.html">About</a>

    <div class="profile-menu" id="profileMenu">
      <button class="profile-btn" id="profileBtn">Profile</button>
      <div class="profile-dropdown" id="profileDropdown">
        <a href="profile.html">My Profile</a>
        <a href="settings.html">Settings</a>
        <a href="index.html" class="logout">Logout</a>
      </div>
    </div>
  </nav>
</header>


<!-- MAIN -->
<main>
  <section class="section">

    <h2>⚙ Settings</h2>

    <div style="
      max-width: 900px;
      background: #121225;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    ">

      <!-- ACCOUNT SETTINGS -->
      <h3 style="margin-bottom: 15px;">👤 Account Settings</h3>

      <label>Email</label>
      <input
        type="email"
        id="emailInput"
        placeholder="Enter email"
        style="width:100%; margin:8px 0 20px; padding:10px;
        border-radius:8px; border:none; background:#1f1f2b; color:#fff;"
      >

      <label>Username</label>
      <input
        type="text"
        id="usernameInput"
        placeholder="Enter username"
        style="width:100%; margin:8px 0 30px; padding:10px;
        border-radius:8px; border:none; background:#1f1f2b; color:#fff;"
      >

      <!-- PASSWORD -->
      <h3 style="margin-bottom: 15px;">🔐 Change Password</h3>

      <input type="password" placeholder="Current Password"
        style="width:100%; margin:8px 0; padding:10px;
        border-radius:8px; border:none; background:#1f1f2b; color:#fff;">

      <input type="password" placeholder="New Password"
        style="width:100%; margin:8px 0; padding:10px;
        border-radius:8px; border:none; background:#1f1f2b; color:#fff;">

      <input type="password" placeholder="Confirm New Password"
        style="width:100%; margin:8px 0 25px; padding:10px;
        border-radius:8px; border:none; background:#1f1f2b; color:#fff;">

      

      <br><br>

      <!-- BUTTONS -->
      <button id="saveProfileBtn"
        style="
          padding: 10px 18px;
          border-radius: 8px;
          border: none;
          cursor: pointer;
          background: #5a4bff;
          color: #fff;
          font-size: 14px;
          margin-right: 10px;
        ">
        Save Changes
      </button>

      <button
        style="
          padding: 10px 18px;
          border-radius: 8px;
          border: none;
          cursor: pointer;
          background: #222;
          color: #ccc;
          font-size: 14px;
        "
        onclick="window.location.href='profile.html'">
        Cancel
      </button>

    </div>

  </section>
</main>

<!-- SETTINGS SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  /* LOAD EXISTING DATA */
  const emailInput = document.getElementById("emailInput");
  const usernameInput = document.getElementById("usernameInput");

  if (emailInput) {
    emailInput.value = localStorage.getItem("profileEmail") || "";
  }

  if (usernameInput) {
    usernameInput.value = localStorage.getItem("profileUsername") || "";
  }

  /* SAVE CHANGES */
  const saveProfileBtn = document.getElementById("saveProfileBtn");

  if (saveProfileBtn) {
    saveProfileBtn.addEventListener("click", () => {
      const email = emailInput?.value.trim() || "";
      const username = usernameInput?.value.trim() || "";

      if (!email || !username) {
        alert("❌ Please fill all fields");
        return;
      }

      localStorage.setItem("profileEmail", email);
      localStorage.setItem("profileUsername", username);

      alert("✅ Profile Updated Successfully!");
      window.location.href = "profile.html";
    });
  }

  /* LOGOUT */
  const logoutBtn = document.getElementById("logoutBtn");

  if (logoutBtn) {
    logoutBtn.onclick = () => {
      localStorage.clear();
      window.location.href = "abhi.html";
    };
  }

});
</script>

<script src="jst.js"></script>

</body>
</html>

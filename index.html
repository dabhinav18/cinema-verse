<style>
  /* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
/* LOGO (for <div class="logo">Cinema Verse</div>) */
.logo {
  font-family: 'Cinzel', serif;
  font-size: 25px;        
  font-weight: 600;       
  color: #ffffff;         
  text-align: center;   
  letter-spacing: 1px;     
  margin-bottom: 20px;    
  width: 100%;            
}


/* BODY */
body { 
  background: #000;
  color: #fff;
  font-family: 'Arial', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  width: 100vw;      /* full screen width */
  height: 100vh;     /* full screen height */
  display: flex;
  justify-content: space-between;
  padding: 0;
  margin: 0;
}


/* LEFT + RIGHT POSTER COLUMNS */
.left-container,
.right-container {
  display: flex;
  gap: 9px;
}

/* EACH COLUMN */
.side-column {
  width: 180px;
  height: 100vh;         /* full screen height */
  overflow: hidden;
  position: relative;

  /* Fade top & bottom */
  mask-image: linear-gradient(to bottom,
    transparent 0%,
    black 15%,
    black 85%,
    transparent 100%
  );
  -webkit-mask-image: linear-gradient(to bottom,
    transparent 0%,
    black 15%,
    black 85%,
    transparent 100%
  );
}

/* SCROLLING CONTAINER */
.scrolling {
  position: absolute;
  top: 0;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
  animation: scrollUp 15s linear infinite;
}

/* OPPOSITE DIRECTION */
.scrolling.reverse {
  animation: scrollDown 15s linear infinite;
}

/* POSTER IMAGES */
.side-column img {
  width: 95%;
  height: 260px;
  object-fit: cover;
  border-radius: 10px;
}

/* CENTER CONTENT */
.center-content {
  flex: 1;
  padding: 0 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.center-content h1 {
  font-size: 60px;
  font-weight: 800;
  margin-bottom: 20px;
}

.center-content p {
  max-width: 400px;
  font-size: 20px;
  font-weight: 300;
  margin-bottom: 30px;
}

.join-btn {
  cursor: pointer;
  padding: 12px 30px;
  font-size: 16px;
  border-radius: 30px;
  border: none;
  font-weight: 600;
  background-color: #8000ff;
  color: #fff;
  transition: 0.3s;
}

.join-btn:hover {
  background-color: #a04fff;
}

/* ANIMATIONS */
@keyframes scrollUp {
  0% { transform: translateY(0); }
  100% { transform: translateY(-25%); }
}

@keyframes scrollDown {
  0% { transform: translateY(-25%); }
  100% { transform: translateY(0); }
}



/* ===================================== */
/* 📱 MOBILE RESPONSIVE (Landing Page) */
/* ===================================== */

@media screen and (max-width: 768px) {

  body {
    overflow-y: auto;
    height: auto;
  }

  .container {
    flex-direction: row;
    height: auto;
  }

  /* 🔥 Hide second column on LEFT */
  .left-container .side-column:nth-child(2) {
    display: none;
  }

  /* 🔥 Hide second column on RIGHT */
  .right-container .side-column:nth-child(2) {
    display: none;
  }

  /* Reduce poster column width */
  .side-column {
    width: 100px;
  }

  .side-column img {
    height: 160px;
  }

  /* Center content smaller */
  .center-content {
    padding: 0 10px;
  }

  .center-content h1 {
    font-size: 17px;
  }

  .center-content p {
    font-size: 10px;
  }

  .logo {
    font-size: 12px;
  }

  .join-btn {
    padding: 10px 10px;
    font-size: 10px;
  }

}
/* ===================================== */
/* 📱 SMALL TABLET (600px – 820px) */
/* ===================================== */

@media screen and (min-width: 600px) and (max-width: 820px) {

  body {
    height: 100vh;
    overflow: hidden;
  }

  .container {
    padding: 0 15px;
  }

  /* Reduce side columns */
  .side-column {
    width: 120px;
  }

  .side-column img {
    height: 190px;
  }

  /* Center content adjust */
  .center-content {
    padding: 0 15px;
  }

  .center-content h1 {
    font-size: 28px;
  }

  .center-content p {
    font-size: 14px;
  }

  .logo {
    font-size: 18px;
  }

  .join-btn {
    padding: 10px 20px;
    font-size: 13px;
  }

}



</style>

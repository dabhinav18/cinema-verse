<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CinemaVerse | Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Movie Review Website created by Abhinav and Shubham">
<link rel="stylesheet" href="cst.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">


<style>
:root{
  --bg:#0e0e1a;
  --card:#121225;
  --card2:#141432;
  --accent:#5a4bff;
  --text:#fff;
  --muted:#aaa;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial}

.profile-layout{
  max-width:1400px;
  margin:40px auto;
  padding:0 30px;
  display:grid;
  grid-template-columns:340px 1fr;
  gap:40px;
  align-items: start; /* ⭐ key fix */
}

.profile-left{
  background:linear-gradient(180deg,#16162f,#0f0f1f);
  border-radius:22px;
  padding:30px;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
  animation:slideLeft .7s ease;
  height: fit-content; /* ⭐ stop vertical stretching */
  align-self: start;
}

.profile-right{
  background:#0f0f1f;
  border-radius:22px;
  padding:30px;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
  animation:slideRight .7s ease;
  /* optional */
  /* max-height: calc(100vh - 120px); */
  /* overflow-y: auto; */
}


@keyframes slideLeft{
  from{opacity:0;transform:translateX(-30px)}
  to{opacity:1;transform:translateX(0)}
}

.profile-header {
  display: flex;
  flex-direction: column;
  align-items: center;   /* 🔥 horizontal center */
  text-align: center;
}

.profile-avatar {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 4px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #5a4bff, #8b5cf6);
  text-transform: uppercase;
  margin-bottom: 14px;   /* 👈 space between avatar & name */

}



.profile-left h2{
  text-align:center;
  margin:14px 0 4px;
}
.profile-right h3 {
  margin-bottom: 20px; /* space between title and reviews */
}

.profile-left p{
  text-align:center;
  color:var(--muted);
  font-size:14px;
}

.profile-data{
  margin-top:25px;
}

.profile-data div{margin-bottom:14px}
.profile-data span{font-size:12px;color:#888}

.profile-actions{
  display:flex;
  gap:12px;
  margin-top:25px;
}

.btn{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.btn-edit{
  background:var(--accent);
  color:#fff;
}
.btn-logout{
  background:#222;
  color:#ccc;
}
.btn:hover{opacity:.9}

.profile-right{
  padding:30px;
}

@keyframes slideRight{
  from{opacity:0;transform:translateX(30px)}
  to{opacity:1;transform:translateX(0)}
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-bottom:30px;
}

.stat-box{
  background:var(--card2);
  padding:18px;
  border-radius:16px;
  text-align:center;
  transition:.3s;
}
.stat-box:hover{transform:translateY(-6px)}

.stat-box h3{
  font-size:28px;
  color:var(--accent);
}
.stat-box p{
  font-size:13px;
  color:#aaa;
}

/* REVIEWS */
.review-item{
  background: var(--card2);
  border-radius: 16px;
  padding: 20px;              /* more inner space */
  margin-bottom: 18px;        /* space between cards */
}

.review-item h4
{
  font-size:15px;
}
.review-item p
{
  font-size:14px;
  color:#ddd;margin:6px 0
}
.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  font-size:11px;
  color:#fff;
}

.Skip { background:#ef4444 }
.Timepass { background:#38bdf8 }
.Good { background:#22c55e }
.Outstanding { background:#8b5cf6 } /* ✅ fixed */


/* ===============================
   REVIEW FILTER BUTTONS
================================ */

.review-filters {
  display: flex;
  gap: 12px;
  margin-bottom: 25px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 8px 18px;
  border-radius: 30px;
  border: 1px solid #333;
  background: transparent;
  color: #ccc;
  cursor: pointer;
  transition: 0.3s;
}
.filter-btn:hover {
  background: transparent;   /* no color change */
  color: #ccc;               /* same as normal */
}

.filter-btn.active {
  background: #ef4444; /* default active color */
  color: white;
}


.review-header-container {
  border-radius: 22px;
  padding: 30px;
  
}

#reviewList {
  margin-top: 30px;
}

.review-item {
  background: linear-gradient(135deg,#1a1a35,#141432);
  border-radius: 20px;
  padding: 25px;
  margin-bottom: 30px;
  transition: 0.3s ease;
}

.review-item:hover {
  transform: translateY(-4px);
}


/* ===================================== */
/* 🍎 iPhone 12 Pro (390px) Responsive */
/* ===================================== */

@media screen and (max-width: 430px) {

  /* NAVBAR STACK */
  .navbar {
    flex-wrap: wrap;
    padding: 12px 14px;
    height: auto;
  }

  .left-nav {
    width: 50%;
  }

  .logo {
    font-size: 16px;
  }

  

  /* Nav links */
  .nav-links {
    width: 100%;
    font-size: 16px;
    display: flex;
    justify-content: space-between;
    margin-left: 5px;
    margin-top: 12px;
  }

  .nav-links a,
  .profile-btn {
    font-size: 13px;
  }
}


/* MOBILE */
@media(max-width:900px){
  .profile-layout{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
}




</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="left-nav">
    <div class="logo">Cinema verse</div>
  </div>


  <nav class="nav-links">
    <a href="explore.html">Explore</a>
    <a href="upcoming.html">Upcoming</a>
    <a href="about.html">About</a>

    <div class="profile-menu" id="profileMenu">
      <button class="profile-btn" id="profileBtn">Profile</button>
      <div class="profile-dropdown" id="profileDropdown">
        <a href="profile.html">My Profile</a>
        <a href="settings.html">Settings</a>
        <a href="index.html" class="logout">Logout</a>
      </div>
    </div>
  </nav>
</header>


<div class="profile-layout">

  <!-- LEFT COLUMN -->
  <div class="profile-left">

    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">V</div>
      <h2 id="pName">vishal</h2>
      <p class="profile-role">Movie Enthusiast 🎬</p>
    </div>

    <div class="profile-data">
      <div><span>Email</span><div id="pEmail">—</div></div>
      <div><span>Username</span><div id="pUsername">—</div></div>
    
    </div>

    <div class="profile-actions">
      <button class="btn btn-edit" onclick="goToSettings()">Edit Profile</button>
      <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>

  </div>

  <!-- RIGHT COLUMN -->
<div class="profile-right">

  <!-- 🔹 SINGLE BIG CONTAINER -->
  <div class="review-header-container">
    
    <h3>Your Reviews</h3>

    <div class="review-filters">
      <button class="filter-btn active" data-type="All">All</button>
      <button class="filter-btn" data-type="Skip">Skip</button>
      <button class="filter-btn" data-type="Timepass">Timepass</button>
      <button class="filter-btn" data-type="Good">Good</button>
      <button class="filter-btn" data-type="Outstanding">Outstanding</button>
    </div>

    <!-- 🔥 REVIEW LIST INSIDE -->
    <div id="reviewList"></div>

  </div>

</div>





<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ================= LOAD LOGGED-IN USER ================= */
  const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));

  if (!loggedInUser) {
    window.location.href = "login.html";
    return;
  }

  /* ================= USER INFO ================= */
  const pEmail = document.getElementById("pEmail");
  const pUsername = document.getElementById("pUsername");
  const pName = document.getElementById("pName");
  const profileAvatar = document.getElementById("profileAvatar");

profileAvatar.innerText =
  loggedInUser.username
    ? loggedInUser.username.charAt(0)
    : "U";


  pEmail.innerText = loggedInUser.email || "—";
  pUsername.innerText = loggedInUser.username || "—";
  pName.innerText = loggedInUser.username || "User";

/* ================= LOAD ONLY LOGGED-IN USER REVIEWS ================= */
const allReviews =
  JSON.parse(localStorage.getItem("movieReviews")) || [];

const reviews = allReviews.filter(
  r => r.username === loggedInUser.username
);

/* ================= DOM REFERENCES ================= */
const reviewList = document.getElementById("reviewList");
const filterButtons = document.querySelectorAll(".filter-btn");

/* ================= RENDER REVIEWS ================= */
function renderReviews(type = "All") {

  reviewList.innerHTML = "";

  const filtered =
    type === "All"
      ? reviews
      : reviews.filter(r => r.type === type);

  if (filtered.length === 0) {
    reviewList.innerHTML = "<p style='color:#888'>No reviews found.</p>";
    return;
  }

  filtered.forEach(r => {
    reviewList.innerHTML += `
      <div class="review-item">
        <h4>${r.movie}</h4>
        <p>${r.review}</p>
        <span class="badge ${r.type}">${r.type}</span>
      </div>
    `;
  });
}

// Default show all
renderReviews("All");

/* ================= FILTER BUTTON LOGIC ================= */
filterButtons.forEach(btn => {
  btn.addEventListener("click", () => {

    filterButtons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const type = btn.dataset.type;
    renderReviews(type);
  });
});


/* ================= ACTIONS ================= */
function goToSettings() {
  window.location.href = "settings.html";
}

function logout() {
  localStorage.removeItem("loggedInUser");
  localStorage.removeItem("isAdmin");
  window.location.href = "index.html";
}
}); // ✅ THIS WAS MISSING

</script>

<script src="jst.js"></script>

</body>
</html>
